<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마비팟 숙제 사이트</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="layout">

        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="d-flex align-items-center gap-2">
                    <img src="https://i.ibb.co/gb5yQyFX/1.png" alt="로고" style="height: 1.2rem; width: auto; object-fit: contain;">
                    <h5 class="mb-0">마비팟</h5>
                </div>
                <button class="btn btn-sm btn-outline-secondary sidebar-toggle" onclick="toggleSidebar()">☰</button>
            </div>

            <ul class="sidebar-menu">

                <li class="menu-title" onclick="changeTab('개요')">개요</li>

                <li class="menu-title" onclick="changeTab('파티 모집')">파티 모집</li>

                <li class="menu-title" onclick="toggleOwnerMenu()">
                    유저 별 숙제 현황 <span id="owner-arrow">▼</span>
                </li>

                <ul id="owner-menu" class="owner-list sub-menu"></ul>

                <li class="menu-title">유저 관리</li>
                <ul class="sub-menu">
                    <li onclick="addPerson()">유저 추가</li>
                    <li onclick="openDeleteUserModal()">유저 삭제</li>
                </ul>

            </ul>
        </aside>

        <main id="main-content">

            <div class="container-fluid mt-4">

                <button class="btn btn-outline-dark d-md-none mb-3" onclick="toggleSidebar()">
                    ☰
                </button>

                <header class="mb-4" id="main-header">
                    <div class="d-flex align-items-center gap-2 mb-1">
                        <img src="https://i.ibb.co/gb5yQyFX/1.png" alt="로고" style="height: 42px; width: auto; object-fit: contain;">
                        <h1 style="font-weight:bold; margin-bottom: 0; line-height: 1;">마비팟 숙제 사이트</h1>
                    </div>
                    
                    <p class="text-muted mb-0" id="tab-description"></p>
                </header>

                <div id="overview-filters"></div>

                <div class="card">
                    <div class="card-body">
                        <div class="row g-3" id="character-cards"></div>
                    </div>
                </div>

            </div>

        </main>

    </div>

    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">캐릭터 정보 수정</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="edit-id">
                    <input type="hidden" id="edit-owner">
                    <div class="mb-3">
                        <label class="form-label">캐릭터 닉네임</label>
                        <input type="text" class="form-control" id="edit-name">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">클래스 (직업)</label>
                        <input type="text" class="form-control" id="edit-job">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">전투력</label>
                        <input type="number" class="form-control" id="edit-power">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">사진 URL</label>
                        <input type="text" class="form-control" id="edit-img-url" placeholder="https://...png">
                        <div class="form-text">이미지 주소를 입력하세요. 이미지 주소는 'https'로 시작해 '.png'로 끝납니다.<br><a href="https://postimages.org/">postimages.org</a> 등의 사이트를 통해 이미지 링크를 추출할 수 있습니다.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">사진 세로 위치 조정 (0~100)</label>
                        <input type="range" class="form-range" id="edit-img-pos" min="0" max="100" value="50">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">완료 체크 색상</label>

                        <div class="d-flex align-items-center gap-2">
                            <input type="color"
                                id="edit-color"
                                class="form-control form-control-color"
                                style="width:60px">

                            <input type="text"
                                id="edit-color-hex"
                                class="form-control"
                                placeholder="#0d6efd">
                        </div>

                    </div>
                </div>
                <div class="modal-footer justify-content-between">
                    <button type="button" class="btn btn-danger" onclick="deleteCharacter()">캐릭터 삭제</button>
                    <div>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                        <button type="button" class="btn btn-primary" onclick="saveCharacter()">저장</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="deleteUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">유저 삭제</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

            <div class="modal-body">

                <label class="form-label">삭제할 유저</label>
                <select id="delete-user-select" class="form-select"></select>

                <label class="form-label mt-3">삭제할 유저의 이름을 한 번 더 임력해주세요.</label>
            <input type="text" id="delete-user-confirm" class="form-control">

            </div>

            <div class="modal-footer">
                <button class="btn btn-danger" onclick="confirmDeleteUser()">삭제</button>
            </div>

            </div>
        </div>
    </div>

    <div id="sidebar-backdrop" class="sidebar-backdrop" onclick="toggleSidebar()"></div>

    <div class="modal fade" id="createPartyModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">파티 모집</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">모집 종류</label>
                        <select class="form-select" id="party-type">
                            <option value="abyss">어비스</option>
                            <option value="raid">레이드</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">세부 선택 <span id="dungeon-help" class="text-muted" style="font-size: 0.8rem;">(다중 선택 가능)</span></label>
                        <div id="party-dungeon-container" class="d-flex flex-wrap gap-2 mt-1"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">파티 제목</label>
                        <input type="text" class="form-control" id="party-title" placeholder="">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">출발 희망 시간</label>
                        <input type="text" class="form-control" id="party-time" placeholder="예: 오늘 밤 10시, 4명 모이면 바로 출발">
                    </div>

                    <div class="mb-3 border p-2 rounded bg-light">
                        <label class="form-label fw-bold">방장 캐릭터 설정</label>
                        <div class="row g-2">
                            <div class="col-6">
                                <select class="form-select form-select-sm" id="create-owner-select" onchange="updateCreateCharSelect()"></select>
                            </div>
                            <div class="col-6">
                                <select class="form-select form-select-sm" id="create-char-select"></select>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">모집 인원</label>
                        <input type="number" class="form-control" id="party-max" value="4" min="2" max="8">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">메모 (선택)</label>
                        <textarea class="form-control" id="party-memo" rows="2" placeholder=""></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btn btn-primary" onclick="createParty()">모집 시작</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="joinPartyModal" tabindex="-1">
        <div class="modal-dialog modal-sm"> <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">파티 참여</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">유저 선택</label>
                        <select class="form-select" id="join-owner-select" onchange="updateJoinCharSelect()"></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">캐릭터 선택</label>
                        <select class="form-select" id="join-char-select"></select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btn btn-primary" onclick="confirmJoin()">참여 확정</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="syncModal" tabindex="-1">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content text-center p-3">
                <div id="syncModalIcon" style="font-size:2rem;">🔄</div>
                <div id="syncModalText" class="mt-2">동기화 중...</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
